function exportJSON() {
    const gw = state.gameWidth;
    const gh = state.gameHeight;
    const ow = getActualObstacleW(); // obstacleW * meterScale * obstacleScale

    const obstacles = state.blocks.map(b => {
        const xExpr = toExpression(b.x, gw, 'gameWidth', ow);
        const yExpr = toExpression(b.y, gh, 'gameHeight', ow);
        return { x: xExpr, y: yExpr, group: b.group, bidx: b.bidx };
    });

    const config = {
        gameWidth: state.gameWidth,
        gameHeight: state.gameHeight,
        obstacleW: state.obstacleW,
        paddingTop: state.paddingTop,
        paddingBottom: state.paddingBottom,
        offsetX: state.offsetX,
        meterScale: state.meterScale,
        obstacleScale: state.obstacleScale,
        contentPadding: state.contentPadding,
        contentPaddingOffsetX: state.contentPaddingOffsetX,
        contentPaddingOffsetY: state.contentPaddingOffsetY,
        monstersAreaWidth: state.monstersAreaWidth,
        monstersAreaHeight: state.monstersAreaHeight,
        monstersAreaOffsetX: state.monstersAreaOffsetX,
        monstersAreaOffsetY: state.monstersAreaOffsetY,
        gameScreen: state.gameScreen,
        scoreScreen: state.scoreScreen,
        uiRotation: state.uiRotation,
        obstacles: obstacles
    };

    return JSON.stringify(config, null, 2);
}

/**
 * Convert a pixel coordinate to a safe expression string.
 * Always uses variable names (gameWidth, gameHeight, obstacleW).
 * Chooses the best anchor based on position in the game area:
 *   - Top/Left half → prefer origin-based (obstacleW, 2*obstacleW)
 *   - Bottom/Right half → prefer edge-based (gameHeight-obstacleW)
 *   - Near center → prefer center-based (gameWidth/2-obstacleW/2)
 */
function toExpression(px, total, varName, ow) {
    if (Math.abs(px) < 1) return '0';
    if (Math.abs(px - total) < 1) return varName;

    const tol = Math.max(2, ow * 0.05);
    const looseTol = ow * 0.15; // wider tolerance for candidate ranking

    // Format N*obstacleW compact string
    function fmtOw(n) {
        if (n === 1) return 'obstacleW';
        if (n === 0.5) return 'obstacleW/2';
        if (Number.isInteger(n)) return `${n}*obstacleW`;
        // Decimal (including half-steps like 1.5, 2.5)
        const r = Math.round(n * 100) / 100;
        return `${r}*obstacleW`;
    }

    // Try to match distance as clean N (int or half-step), returns {n, err} or null
    function tryClean(dist, tolerance) {
        if (Math.abs(dist) < 1) return null;
        const absDist = Math.abs(dist);
        // Integer multiple
        const n = Math.round(absDist / ow);
        const errInt = Math.abs(absDist - n * ow);
        if (n > 0 && errInt < tolerance) return { n, err: errInt };
        // Half-step
        const nh = Math.round(absDist / ow * 2) / 2;
        const errHalf = Math.abs(absDist - nh * ow);
        if (nh > 0 && nh % 1 === 0.5 && errHalf < tolerance) return { n: nh, err: errHalf };
        return null;
    }

    // Collect all candidates: { expr, err, priority }
    // Lower priority number = preferred
    const candidates = [];
    const inUpperHalf = px <= total / 2;

    // From origin
    const originMatch = tryClean(px, looseTol);
    if (originMatch) {
        candidates.push({
            expr: fmtOw(originMatch.n),
            err: originMatch.err,
            priority: inUpperHalf ? 0 : 2, // prefer in upper half
            n: originMatch.n
        });
    }

    // From far edge
    const edgeDist = total - px;
    const edgeMatch = tryClean(edgeDist, looseTol);
    if (edgeMatch) {
        candidates.push({
            expr: `${varName}-${fmtOw(edgeMatch.n)}`,
            err: edgeMatch.err,
            priority: inUpperHalf ? 2 : 0, // prefer in lower half
            n: edgeMatch.n
        });
    }

    // Center-based
    const fromCenter = px - total / 2;
    if (Math.abs(fromCenter) < tol) {
        candidates.push({ expr: `${varName}/2`, err: Math.abs(fromCenter), priority: 1, n: 0 });
    } else {
        const centerMatch = tryClean(Math.abs(fromCenter), looseTol);
        if (centerMatch) {
            const owStr = fmtOw(centerMatch.n);
            candidates.push({
                expr: fromCenter > 0 ? `${varName}/2+${owStr}` : `${varName}/2-${owStr}`,
                err: centerMatch.err,
                priority: 1, // middle priority
                n: centerMatch.n
            });
        }
    }

    // Pick best candidate: first by accuracy, then by simplicity
    if (candidates.length > 0) {
        // Filter: only candidates within loose tolerance
        const valid = candidates.filter(c => c.err < looseTol);
        if (valid.length > 0) {
            valid.sort((a, b) => {
                // First: prefer tighter tolerance matches
                const aClean = a.err < tol ? 0 : 1;
                const bClean = b.err < tol ? 0 : 1;
                if (aClean !== bClean) return aClean - bClean;
                // Then: prefer smallest error for best round-trip accuracy
                if (Math.abs(a.err - b.err) > 0.01) return a.err - b.err;
                // Then: simpler expression (smaller N)
                return a.n - b.n;
            });
            return valid[0].expr;
        }
    }

    // Fallback: fractional obstacleW from best anchor
    const distFromEnd = total - px;
    const distFromCenter = Math.abs(fromCenter);

    if (px <= distFromEnd && px <= distFromCenter) {
        return fmtOw(Math.round((px / ow) * 100) / 100);
    } else if (distFromEnd <= px && distFromEnd <= distFromCenter) {
        return `${varName}-${fmtOw(Math.round((distFromEnd / ow) * 100) / 100)}`;
    } else {
        const r = Math.round((distFromCenter / ow) * 100) / 100;
        if (fromCenter > 0) return `${varName}/2+${fmtOw(r)}`;
        else return `${varName}/2-${fmtOw(r)}`;
    }
}

<tr><td>微调位置</td><td><kbd>←</kbd> <kbd>↑</kbd> <kbd>→</kbd> <kbd>↓</kbd> 方向键（1px 步进）</td></tr>
<tr><td>快速移动</td><td><kbd>Shift</kbd> + 方向键（10px 步进）</td></tr>
</table>
<p><strong>注意：</strong>方块无法移入中央红色虚线标注的<em>怪物区域</em>，会被自动推到区域外最近的边缘。</p>

<h3>工具栏按钮</h3>
<table>
<tr><th>按钮</th><th>说明</th></tr>
<tr><td><strong>Add（添加）</strong></td><td>在中心添加新方块（自动避开怪物区域）</td></tr>
<tr><td><strong>Delete（删除）</strong></td><td>删除选中的方块</td></tr>
<tr><td><strong>Preset Layout（预设布局）</strong></td><td>加载预定义布局（默认、简易、标准、完整、圆形）</td></tr>
<tr><td><strong>Undo（撤销）</strong></td><td>撤销上一步操作（最多 50 步）</td></tr>
<tr><td><strong>Rotate 90°（旋转）</strong></td><td>将所有方块绕中心顺时针旋转 90°</td></tr>
<tr><td><strong>Grid Snap（网格吸附）</strong></td><td>切换网格吸附功能</td></tr>
<tr><td><strong>Event Mode（事件模式）</strong></td><td>测试方块响应动画效果（点击方块触发）</td></tr>
<tr><td><strong>Fullscreen（全屏）</strong></td><td>全屏预览，模拟游戏实际的 Scale.FIT 渲染</td></tr>
</table>

<h3>键盘快捷键</h3>
<table>
<tr><th>按键</th><th>功能</th></tr>
<tr><td><kbd>Ctrl</kbd>/<kbd>Cmd</kbd> + <kbd>Z</kbd></td><td>撤销</td></tr>
<tr><td><kbd>Delete</kbd> / <kbd>Backspace</kbd></td><td>删除选中方块</td></tr>
<tr><td><kbd>方向键</kbd></td><td>移动选中方块 1px</td></tr>
<tr><td><kbd>Shift</kbd> + <kbd>方向键</kbd></td><td>移动选中方块 10px</td></tr>
<tr><td><kbd>ESC</kbd></td><td>退出全屏</td></tr>
</table>

<h3>右侧面板 — 系统配置</h3>
<table>
<tr><th>参数</th><th>说明</th></tr>
<tr><td><code>gameWidth / gameHeight</code></td><td>游戏区域尺寸（像素），定义坐标空间</td></tr>
<tr><td><code>obstacleW</code></td><td>障碍物基础尺寸（缩放前）</td></tr>
<tr><td><code>meterScale</code></td><td>每米像素数乘数</td></tr>
<tr><td><code>obstacleScale</code></td><td>障碍物额外缩放系数</td></tr>
<tr><td><code>paddingTop / paddingBottom</code></td><td>游戏显示的上下边距（像素）</td></tr>
<tr><td><code>offsetX</code></td><td>游戏区域水平偏移</td></tr>
<tr><td><code>contentPadding</code></td><td>安全区域内边距（全屏预览中的黄色边框）</td></tr>
<tr><td><code>contentPadOfsX / Y</code></td><td>安全区域偏移微调</td></tr>
<tr><td><code>monstersAreaW / H</code></td><td>中央禁区尺寸（红色虚线框）</td></tr>
<tr><td><code>monstersOfsX / Y</code></td><td>禁区相对中心的偏移</td></tr>
<tr><td><code>gameScreen / scoreScreen</code></td><td>显示屏分配索引</td></tr>
<tr><td><code>uiRotation</code></td><td>UI 旋转角度（度）</td></tr>
</table>

<h3>选中方块属性</h3>
<ul>
<li><strong>X / Y</strong> — 方块在游戏坐标系中的位置（可编辑）</li>
<li><strong>Group（分组）</strong> — 逻辑分组字母（A–Z），同组方块共享行为</li>
<li><strong>bidx</strong> — 硬件按钮索引（对应物理传感器编号）</li>
<li><strong>Quick Set Group</strong> — 一键设置分组的快捷按钮</li>
</ul>

<h3>JSON 配置</h3>
<p>右下角的 JSON 文本框<strong>实时同步</strong>：</p>
<ul>
<li>画布上的任何修改会即时更新 JSON</li>
<li>手动编辑 JSON 内容也会即时更新画布（400ms 防抖）</li>
<li><strong>Download JSON</strong> — 下载为 <code>.json</code> 文件</li>
<li><strong>Copy</strong> — 复制 JSON 到剪贴板</li>

<p>障碍物坐标使用表达式（如 <code>gameWidth-obstacleW</code>），使布局可以适配不同游戏尺寸。</p>

<p>模拟游戏实际的 <strong>Scale.FIT</strong> 显示效果。预览模式中：</p>

<li><strong>黄色边框</strong> — 内容安全区域（contentPadding）</li>
<li><strong>绿色边框</strong> — 怪物区域</li>
<li>通过左上角浮动控件切换网格、调试边框、事件模式</li>
</ul>
`
    }
};

let helpLang = 'en';

function showHelp(lang) {
    helpLang = lang || helpLang;
    const content = HELP_CONTENT[helpLang];
    document.getElementById('helpTitle').textContent = content.title;
    document.getElementById('helpBody').innerHTML = content.html;
    document.getElementById('helpLangEn').classList.toggle('active', helpLang === 'en');
    document.getElementById('helpLangZh').classList.toggle('active', helpLang === 'zh');
    document.getElementById('helpModal').style.display = 'flex';
}

document.getElementById('btnHelp').addEventListener('click', () => {
    // Auto-detect language from appConfigs
    const locale = (appConfigs.locale || 'en').toLowerCase();
    showHelp(locale.startsWith('zh') ? 'zh' : 'en');
});
document.getElementById('helpClose').addEventListener('click', () => {
    document.getElementById('helpModal').style.display = 'none';
});
document.getElementById('helpModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) {
        document.getElementById('helpModal').style.display = 'none';
    }
});
document.getElementById('helpLangEn').addEventListener('click', () => showHelp('en'));
document.getElementById('helpLangZh').addEventListener('click', () => showHelp('zh'));

</script>
